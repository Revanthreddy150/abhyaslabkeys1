<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhyas Lab Keys | Student Portal</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #e2e8f0; }
        .card-info { padding: 15px; text-align: center; }
        .card-info strong { display: block; font-size: 1.1rem; color: #1e293b; }
        
        .loading-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8);
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="color: var(--primary);">Abhyas Lab Keys</h1>
        <p>Your Cloud-Synced Repository</p>
    </div>
    <div class="grid" id="main-grid"></div>
</div>

<div id="loader" class="loading-overlay">Opening Document...</div>

<script type="module">
    import { dbRef, onValue } from './firebase.js';

    const grid = document.getElementById('main-grid');
    const loader = document.getElementById('loader');

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val() || {};
        grid.innerHTML = '';
        
        Object.keys(data).forEach(key => {
            const item = data[key];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.img || 'https://via.placeholder.com/300x150?text=No+Preview'}" alt="Preview">
                <div class="card-info">
                    <strong>${item.name}</strong>
                    <small style="color:gray;">Tap to View PDF</small>
                </div>
            `;
            card.onclick = () => {
                loader.style.display = 'flex';
                setTimeout(() => {
                    window.open(item.link, '_blank');
                    loader.style.display = 'none';
                }, 1000);
            };
            grid.appendChild(card);
        });
    });
</script>
</body>
</html>
