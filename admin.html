<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Lab Keys</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f1f5f9; }
        .admin-box { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin-bottom: 30px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .list-item { background: white; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-radius: 8px; }
        .list-item img { width: 50px; height: 50px; border-radius: 5px; margin-right: 15px; object-fit: cover; }
        .del-btn { background: #ef4444; }
    </style>
</head>
<body>

    <h2>Admin Control Panel</h2>

    <div class="admin-box">
        <h3>Add New Lab Record</h3>
        <input type="text" id="itemName" placeholder="File Name (e.g. Java Lab 1)">
        <input type="text" id="itemImg" placeholder="Thumbnail Image URL">
        <input type="text" id="itemLink" placeholder="PDF Direct URL">
        <button id="saveBtn">Upload to Database</button>
    </div>

    <div id="admin-list"></div>

<script type="module">
    import { db, dbRef, push, onValue, remove, ref } from './firebase.js';

    const saveBtn = document.getElementById('saveBtn');
    const listDiv = document.getElementById('admin-list');

    // Save Data
    saveBtn.onclick = () => {
        const name = document.getElementById('itemName').value;
        const img = document.getElementById('itemImg').value;
        const link = document.getElementById('itemLink').value;

        if(name && link) {
            push(dbRef, { name, img, link }).then(() => {
                alert("Saved successfully!");
                document.querySelectorAll('input').forEach(i => i.value = '');
            });
        }
    };

    // Load Data for Deletion/Viewing
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val() || {};
        listDiv.innerHTML = '<h3>Existing Files</h3>';
        
        Object.keys(data).forEach(key => {
            const item = data[key];
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <img src="${item.img || 'https://via.placeholder.com/50'}">
                    <span>${item.name}</span>
                </div>
                <button class="del-btn" onclick="deleteItem('${key}')">Delete</button>
            `;
            listDiv.appendChild(div);
        });
    });

    // Global function for the delete button
    window.deleteItem = (key) => {
        if(confirm("Are you sure?")) {
            remove(ref(db, 'lab_keys/' + key));
        }
    };
</script>
</body>
</html>
