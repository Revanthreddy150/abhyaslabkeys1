<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYALABKEYS | HD Repository</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #10b981; --text: #1f2937; --bg: #ffffff; --code-bg: #1e293b; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; overflow-x: hidden; }
        .container { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 2.8rem; margin: 0; line-height: 1.1; color: var(--primary); }
        .feature-box { background: #f9fafb; padding: 25px; border-radius: 20px; margin: 25px 0; border: 1px solid #f3f4f6; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #e5e7eb; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card:active { transform: scale(0.96); background: #f9fafb; }
        
        #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 16px 32px; border-radius: 50px; z-index: 5000; font-weight: 600; text-align: center; }
        
        #qa-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .modal-wrapper { max-width: 600px; margin: 40px auto; padding: 12px; border-radius: 35px; }
        .modal-content { background: white; border-radius: 25px; padding: 30px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #9ca3af; }
        
        .qa-item { border-bottom: 1px solid #f3f4f6; padding: 15px 0; }
        .qa-question { font-weight: 700; color: var(--primary); cursor: pointer; }
        .qa-ans-box { display: none; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .qa-code { font-family: 'Fira Code', monospace; white-space: pre-wrap; font-size: 13px; color: #374151; background: #f1f5f9; padding: 15px; border-radius: 12px; overflow-x: auto; margin-top: 10px; border: 1px solid #cbd5e1; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .copy-btn { background: var(--secondary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; flex: 2; font-weight: 700; transition: 0.3s; }
        .share-btn { background: #6366f1; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; flex: 1; font-weight: 700; }

        /* Shared Page Styles */
        #share-view { display: none; min-height: 100vh; background: #0f172a; color: white; padding: 40px 20px; }
        .share-card { max-width: 800px; margin: 0 auto; }
        .share-header { margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 20px; }
        .share-code-container { background: var(--code-bg); padding: 25px; border-radius: 15px; border: 1px solid #334155; position: relative; font-family: 'Courier New', monospace; line-height: 1.6; color: #e2e8f0; overflow-x: auto; margin-bottom: 20px;}

        /* Animation Snippet */
        .flyer {
            position: fixed; z-index: 9999; background: var(--primary); color: white;
            padding: 10px; border-radius: 5px; font-family: monospace; font-size: 10px;
            pointer-events: none; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); opacity: 0.9;
        }
        .btn-catch { transform: scale(1.1); background: #059669 !important; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="app-shell">
    <div class="container">
        <div class="hero">
            <h1>Abhyas<br><span>Lab Keys</span></h1>
            <p style="color:#6b7280; font-weight: 500;">Cloud-Synced HD Repository.</p>
        </div>
        <div class="feature-box">
            <ul style="list-style:none; padding:0; margin: 0; font-weight: 600;">
                <li>✦ High-Speed Access</li>
                <li style="margin: 10px 0;">✦ Short-Link Sharing</li>
                <li>✦ Real-Time Sync</li>
            </ul>
        </div>
        <div id="loading-text" style="text-align:center; color:gray; padding: 20px;">Loading Repository...</div>
        <div class="grid" id="main-grid"></div>
    </div>
</div>

<div id="qa-modal">
    <div class="modal-wrapper">
        <div class="modal-content">
            <span class="close-modal" onclick="closeQA()">&times;</span>
            <h2 id="modal-title" style="margin:0 0 15px 0; color: var(--primary);">Questions</h2>
            <div id="qa-container"></div>
        </div>
    </div>
</div>

<div id="share-view">
    <div class="share-card">
        <div class="share-header">
            <h2 style="margin:0; color: var(--primary);">Program Detail</h2>
            <p id="shared-q" style="margin:10px 0 0 0; opacity: 0.8; font-size: 1.1rem;"></p>
        </div>
        <div class="share-code-container" id="shared-a"></div>
        <div class="btn-group">
            <button class="copy-btn" id="share-copy-btn" onclick="copySharedCode()">COPY SOURCE CODE</button>
            <button class="share-btn" style="background:#475569;" onclick="window.location.href=window.location.pathname">CLOSE</button>
        </div>
        <p style="text-align:center; margin-top:40px; font-size: 12px; opacity: 0.4;">ADITYALABKEYS REPOSITORY</p>
    </div>
</div>

<script type="module">
    import { db, ref, onValue } from "./firebase-config.js";

    let currentData = {};
    let activeKey = null;

    // --- Flying Animation ---
    function animateCode(sourceId, btnId) {
        const src = document.getElementById(sourceId);
        const btn = document.getElementById(btnId);
        const sRect = src.getBoundingClientRect();
        const bRect = btn.getBoundingClientRect();

        const flyer = document.createElement('div');
        flyer.className = 'flyer';
        flyer.innerText = src.innerText.substring(0, 100) + "...";
        flyer.style.top = sRect.top + "px";
        flyer.style.left = sRect.left + "px";
        flyer.style.width = "200px";
        document.body.appendChild(flyer);

        btn.classList.add('btn-catch');

        setTimeout(() => {
            flyer.style.top = (bRect.top + 10) + "px";
            flyer.style.left = (bRect.left + 50) + "px";
            flyer.style.width = "40px";
            flyer.style.height = "20px";
            flyer.style.opacity = "0";
            flyer.style.transform = "scale(0.2)";
        }, 50);

        setTimeout(() => { flyer.remove(); btn.classList.remove('btn-catch'); }, 750);
    }

    function showMsg(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    // --- Firebase Logic ---
    onValue(ref(db, 'lab_keys'), (snap) => {
        currentData = snap.val() || {};
        document.getElementById('loading-text').style.display = 'none';
        renderCards();
    });

    function renderCards() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        Object.keys(currentData).forEach(key => {
            const item = currentData[key];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>${item.name}</strong><p style="font-size:11px; color:var(--secondary); margin-top:5px;">VIEW REPOSITORY</p>`;
            div.onclick = () => openQA(key);
            grid.appendChild(div);
        });
    }

    function openQA(key) {
        activeKey = key;
        const item = currentData[key];
        const cont = document.getElementById('qa-container');
        document.getElementById('modal-title').innerText = item.name;
        cont.innerHTML = '';
        (item.questions || []).forEach((p, i) => {
            const row = document.createElement('div');
            row.className = 'qa-item';
            row.innerHTML = `
                <div class="qa-question" id="q-${i}" onclick="document.getElementById('ans-${i}').style.display='block'">${p.q}</div>
                <div class="qa-ans-box" id="ans-${i}">
                    <div class="qa-code" id="txt-${i}">${p.a}</div>
                    <div class="btn-group">
                        <button class="copy-btn" id="btn-${i}" onclick="copyMain(${i})">COPY</button>
                        <button class="share-btn" onclick="genShare(${i})">SHARE</button>
                    </div>
                </div>
            `;
            cont.appendChild(row);
        });
        document.getElementById('qa-modal').style.display = 'block';
    }

    window.copyMain = (i) => {
        animateCode(`txt-${i}`, `btn-${i}`);
        navigator.clipboard.writeText(document.getElementById(`txt-${i}`).innerText);
        showMsg("Copied to Clipboard!");
    };

    window.copySharedCode = () => {
        animateCode('shared-a', 'share-copy-btn');
        navigator.clipboard.writeText(document.getElementById('shared-a').innerText);
        showMsg("Copied!");
    };

    window.genShare = (i) => {
        const q = document.getElementById(`q-${i}`).innerText;
        const a = document.getElementById(`txt-${i}`).innerText;
        // Use URLSearchParams for cleaner encoding
        const data = btoa(encodeURIComponent(JSON.stringify({q, a})));
        const link = `${window.location.origin}${window.location.pathname}?v=${data}`;
        navigator.clipboard.writeText(link).then(() => showMsg("Share Link Copied!"));
    };

    window.closeQA = () => { document.getElementById('qa-modal').style.display = 'none'; };

    // --- Router Logic ---
    function checkRoute() {
        const params = new URLSearchParams(window.location.search);
        const v = params.get('v');
        if (v) {
            try {
                const data = JSON.parse(decodeURIComponent(atob(v)));
                document.getElementById('app-shell').style.display = 'none';
                document.getElementById('share-view').style.display = 'block';
                document.getElementById('shared-q').innerText = data.q;
                document.getElementById('shared-a').innerText = data.a;
            } catch (e) { console.error("Link Invalid"); }
        }
    }

    checkRoute();
</script>

</body>
</html>
