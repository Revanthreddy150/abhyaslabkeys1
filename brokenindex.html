<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYALABKEYS | HD Repository</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #10b981; --text: #1f2937; --bg: #ffffff; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; overflow-x: hidden; }
        .container { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 2.8rem; margin: 0; line-height: 1.1; color: var(--primary); }
        .feature-box { background: #f9fafb; padding: 25px; border-radius: 20px; margin: 25px 0; border: 1px solid #f3f4f6; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #e5e7eb; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card:active { transform: scale(0.96); background: #f9fafb; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top: 2px solid var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .card.loading .spinner { display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 16px 32px; border-radius: 50px; z-index: 5000; font-weight: 600; text-align: center; }
        
        /* Modal Styles */
        #qa-modal, #share-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .modal-wrapper { max-width: 600px; margin: 40px auto; padding: 12px; border-radius: 35px; transition: 0.3s; }
        .modal-content { background: white; border-radius: 25px; padding: 30px; position: relative; }
        .frame-red { background: #ef4444; } .frame-blue { background: #3b82f6; } .frame-yellow { background: #f59e0b; } .frame-green { background: #10b981; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #9ca3af; }
        
        .qa-item { border-bottom: 1px solid #f3f4f6; padding: 15px 0; }
        .qa-question { font-weight: 700; color: var(--primary); cursor: pointer; flex: 1; }
        .qa-ans-box { display: none; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .qa-code { font-family: monospace; white-space: pre-wrap; font-size: 13px; color: #374151; background: #f1f5f9; padding: 10px; border-radius: 8px; overflow-x: auto; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .copy-btn { background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; flex: 2; font-weight: 700; }
        .share-btn { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: 700; }

        /* Share Page Specific */
        #share-view { background: #f3f4f6; z-index: 4000; }
        .share-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="app-shell">
    <div class="container">
        <div class="hero">
            <h1>Abhyas<br><span>Lab Keys</span></h1>
            <p style="color:#6b7280; font-weight: 500;">Cloud-Synced HD Repository.</p>
        </div>

        <div class="feature-box">
            <ul style="list-style:none; padding:0; margin: 0; font-weight: 600;">
                <li>✦ Resource Efficiency</li>
                <li style="margin: 10px 0;">✦ Easy to access programs</li>
                <li>✦ Real-Time Updates</li>
            </ul>
        </div>

        <div id="loading-text" style="text-align:center; color:gray; padding: 20px;">Fetching Repository...</div>
        <div class="grid" id="main-grid"></div>
    </div>
</div>

<div id="qa-modal">
    <div class="modal-wrapper" id="modal-wrapper">
        <div class="modal-content">
            <span class="close-modal" onclick="closeQA()">&times;</span>
            <h2 id="modal-title" style="margin:0 0 15px 0; color: var(--primary);">Questions</h2>
            <div id="qa-container"></div>
        </div>
    </div>
</div>

<div id="share-view">
    <div class="share-container">
        <h1 style="color:var(--primary); margin-top:0;">USEAS LAB</h1>
        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
        <h3 id="shared-q" style="color:#374151;"></h3>
        <div class="qa-code" id="shared-a" style="margin: 20px 0; max-height: 400px; overflow-y: auto;"></div>
        <div class="btn-group">
            <button class="copy-btn" onclick="copySharedCode()">COPY CODE</button>
            <button class="share-btn" style="background:#6b7280;" onclick="location.href=location.pathname">BACK TO HOME</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, ref, onValue } from "./firebase-config.js";

    let currentData = {};
    let activeKey = null;

    function showMsg(text) {
        const t = document.getElementById('toast');
        t.innerText = text;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }

    // --- Share Logic ---
    function checkShareLink() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('q') && params.has('a')) {
            document.getElementById('app-shell').style.display = 'none';
            document.getElementById('share-view').style.display = 'block';
            document.getElementById('shared-q').innerText = decodeURIComponent(params.get('q'));
            document.getElementById('shared-a').innerText = decodeURIComponent(params.get('a'));
        }
    }

    window.shareCode = (idx) => {
        const question = document.getElementById(`q-text-${idx}`).textContent;
        const answer = document.getElementById(`text-${idx}`).textContent;
        
        // Create shareable URL
        const baseUrl = window.location.origin + window.location.pathname;
        const shareUrl = `${baseUrl}?q=${encodeURIComponent(question)}&a=${encodeURIComponent(answer)}`;
        
        navigator.clipboard.writeText(shareUrl).then(() => {
            showMsg("Share Link Copied to Clipboard!");
        });
    };

    window.copySharedCode = () => {
        const code = document.getElementById('shared-a').innerText;
        navigator.clipboard.writeText(code).then(() => showMsg("Code Copied!"));
    };

    // --- Firebase & Rendering ---
    const dbRef = ref(db, 'lab_keys');
    onValue(dbRef, (snapshot) => {
        currentData = snapshot.val() || {};
        document.getElementById('loading-text').style.display = 'none';
        render();
        if(activeKey) openQA(activeKey);
    });

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';

        Object.keys(currentData).forEach((key) => {
            const item = currentData[key];
            const card = document.createElement('div');
            card.className = 'card';
            const isQA = item.type === 'qa';
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <strong>${item.name}</strong>
                    <div class="spinner"></div>
                </div>
                <p style="font-size:11px; color:${isQA ? '#10b981' : '#9ca3af'}; font-weight:800; margin: 5px 0 0 0;">
                    ${isQA ? 'VIEW REPOSITORY' : 'OPEN PDF'}
                </p>
            `;
            
            card.onclick = () => {
                if(card.classList.contains('loading')) return;
                if(isQA) {
                    openQA(key);
                } else {
                    card.classList.add('loading');
                    setTimeout(() => {
                        window.open(item.link, '_blank');
                        card.classList.remove('loading');
                    }, 800);
                }
            };
            grid.appendChild(card);
        });
    }

    function openQA(key) {
        activeKey = key;
        const item = currentData[key];
        const wrapper = document.getElementById('modal-wrapper');
        const container = document.getElementById('qa-container');
        
        document.getElementById('modal-title').innerText = item.name;
        wrapper.className = 'modal-wrapper frame-' + (item.color || 'blue');
        
        container.innerHTML = '';
        (item.questions || []).forEach((pair, index) => {
            const div = document.createElement('div');
            div.className = 'qa-item';
            div.innerHTML = `
                <div class="qa-question" id="q-text-${index}" onclick="toggleAns(${index})"></div>
                <div class="qa-ans-box" id="ans-${index}">
                    <div class="qa-code" id="text-${index}"></div>
                    <div class="btn-group">
                        <button class="copy-btn" id="copy-btn-${index}">COPY CODE</button>
                        <button class="share-btn" onclick="shareCode(${index})">SHARE</button>
                    </div>
                </div>
            `;
            div.querySelector(`#q-text-${index}`).textContent = pair.q;
            div.querySelector(`#text-${index}`).textContent = pair.a;
            container.appendChild(div);

            div.querySelector(`#copy-btn-${index}`).onclick = () => copyCode(index);
        });
        document.getElementById('qa-modal').style.display = 'block';
    }

    window.toggleAns = (idx) => {
        const box = document.getElementById(`ans-${idx}`);
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    };

    const copyCode = (idx) => {
        const code = document.getElementById(`text-${idx}`).textContent;
        navigator.clipboard.writeText(code).then(() => showMsg("Code Copied!"));
    };

    window.closeQA = () => {
        document.getElementById('qa-modal').style.display = 'none';
        activeKey = null;
    };

    // Initialize share check on load
    checkShareLink();
</script>

</body>
</html>
