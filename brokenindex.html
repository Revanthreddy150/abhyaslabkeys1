<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYALABKEYS | HD Repository</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #10b981; --text: #1f2937; --bg: #ffffff; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .container { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 2.8rem; margin: 0; line-height: 1.1; color: var(--primary); }
        .feature-box { background: #f9fafb; padding: 25px; border-radius: 20px; margin: 25px 0; border: 1px solid #f3f4f6; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #e5e7eb; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card:active { transform: scale(0.96); background: #f9fafb; }
        
        /* Modal & UI Elements */
        #toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 12px 24px; border-radius: 50px; z-index: 5000; font-weight: 600; }
        #qa-modal, #share-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        #share-view { display: none; padding: 20px; box-sizing: border-box; }
        
        .modal-wrapper { max-width: 700px; margin: 20px auto; padding: 10px; border-radius: 30px; }
        .modal-content { background: white; border-radius: 25px; padding: 25px; position: relative; }
        .frame-red { background: #ef4444; } .frame-blue { background: #3b82f6; } .frame-yellow { background: #f59e0b; } .frame-green { background: #10b981; }
        
        .qa-item { border-bottom: 1px solid #f3f4f6; padding: 15px 0; }
        .qa-question { font-weight: 700; color: var(--primary); cursor: pointer; margin-bottom: 8px; }
        .qa-ans-box { display: none; background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .qa-code { font-family: 'Fira Code', monospace; white-space: pre-wrap; font-size: 13px; color: #e2e8f0; overflow-x: auto; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; color: white; text-align: center; }
        .copy-btn { background: #10b981; }
        .share-btn { background: #6366f1; }
        .run-btn { background: #f59e0b; }
        .close-btn { background: #ef4444; margin-top: 20px; width: 100%; }
        
        /* Compiler Output */
        .output-box { background: #000; color: #10b981; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; min-height: 40px; border-left: 4px solid #f59e0b; display: none; }
        .spinner { width: 18px; height: 18px; border: 2px solid #ffffff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 5px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="main-container" class="container">
    <div class="hero">
        <h1>Abhyas<br><span>Lab Keys</span></h1>
        <p style="color:#6b7280; font-weight: 500;">Cloud-Synced HD Repository.</p>
    </div>

    <div class="feature-box">
        <ul style="list-style:none; padding:0; margin: 0; font-weight: 600;">
            <li>✦ Resource Efficiency</li>
            <li style="margin: 10px 0;">✦ Real-Time Compiler Support</li>
            <li>✦ Direct Code Sharing</li>
        </ul>
    </div>

    <div id="loading-text" style="text-align:center; color:gray; padding: 20px;">Fetching Repository...</div>
    <div class="grid" id="main-grid"></div>
</div>

<div id="qa-modal">
    <div class="modal-wrapper" id="modal-wrapper">
        <div class="modal-content">
            <h2 id="modal-title" style="margin:0 0 15px 0; color: var(--primary);">Questions</h2>
            <div id="qa-container"></div>
            <button class="btn close-btn" onclick="closeQA()">CLOSE REPOSITORY</button>
        </div>
    </div>
</div>

<div id="share-view">
    <div style="max-width:700px; margin: 0 auto;">
        <h1 style="color: var(--primary); text-align: center;">Abhyas Lab Keys</h1>
        <div class="modal-content" style="border: 1px solid #e5e7eb; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h3 id="shared-q-title" style="color: var(--primary); margin-top:0;"></h3>
            <div class="qa-ans-box" style="display:block;">
                <div class="qa-code" id="shared-code-text"></div>
            </div>
            <div class="btn-group">
                <button class="btn copy-btn" id="shared-copy-btn">COPY</button>
                <button class="btn run-btn" id="shared-run-btn">RUN CODE</button>
            </div>
            <div id="shared-output" class="output-box"></div>
            <button class="btn close-btn" onclick="location.href=window.location.pathname">VIEW ALL PROGRAMS</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, ref, onValue } from "./firebase-config.js";

    let currentData = {};
    let activeKey = null;

    const showMsg = (text) => {
        const t = document.getElementById('toast');
        t.innerText = text;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    };

    // --- Database Initialization ---
    const dbRef = ref(db, 'lab_keys');
    onValue(dbRef, (snapshot) => {
        currentData = snapshot.val() || {};
        document.getElementById('loading-text').style.display = 'none';
        
        // Handle Routing
        const params = new URLSearchParams(window.location.search);
        const labId = params.get('id');
        const qIdx = params.get('q');

        if (labId && qIdx !== null && currentData[labId]) {
            renderShareView(labId, qIdx);
        } else {
            render();
        }
    });

    // --- Main Rendering ---
    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        Object.keys(currentData).forEach((key) => {
            const item = currentData[key];
            const card = document.createElement('div');
            card.className = 'card';
            const isQA = item.type === 'qa';
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <strong>${item.name}</strong>
                </div>
                <p style="font-size:11px; color:${isQA ? '#10b981' : '#9ca3af'}; font-weight:800; margin: 5px 0 0 0;">
                    ${isQA ? 'VIEW REPOSITORY' : 'OPEN PDF'}
                </p>
            `;
            
            card.onclick = () => isQA ? openQA(key) : window.open(item.link, '_blank');
            grid.appendChild(card);
        });
    }

    // --- Modal View ---
    function openQA(key) {
        activeKey = key;
        const item = currentData[key];
        const container = document.getElementById('qa-container');
        document.getElementById('modal-title').innerText = item.name;
        document.getElementById('modal-wrapper').className = 'modal-wrapper frame-' + (item.color || 'blue');
        
        container.innerHTML = '';
        (item.questions || []).forEach((pair, index) => {
            const div = document.createElement('div');
            div.className = 'qa-item';
            div.innerHTML = `
                <div class="qa-question" onclick="toggleAns(${index})">${pair.q}</div>
                <div class="qa-ans-box" id="ans-${index}">
                    <div class="qa-code" id="text-${index}">${pair.a}</div>
                    <div class="btn-group">
                        <button class="btn copy-btn" onclick="copyCode(${index})">COPY</button>
                        <button class="btn run-btn" onclick="runCode('${key}', ${index}, 'ans-${index}')">RUN</button>
                        <button class="btn share-btn" onclick="shareQuestion('${key}', ${index})">SHARE</button>
                    </div>
                    <div id="output-ans-${index}" class="output-box"></div>
                </div>
            `;
            container.appendChild(div);
        });
        document.getElementById('qa-modal').style.display = 'block';
        document.getElementById('main-container').style.display = 'none';
    }

    // --- Shared View Implementation ---
    function renderShareView(labId, qIdx) {
        const item = currentData[labId];
        const pair = item.questions[qIdx];
        document.getElementById('main-container').style.display = 'none';
        document.getElementById('share-view').style.display = 'block';
        
        document.getElementById('shared-q-title').innerText = pair.q;
        document.getElementById('shared-code-text').innerText = pair.a;
        
        document.getElementById('shared-copy-btn').onclick = () => {
            navigator.clipboard.writeText(pair.a);
            showMsg("Code Copied!");
        };
        
        document.getElementById('shared-run-btn').onclick = () => runCode(labId, qIdx, 'shared');
    }

    // --- Helper Functions ---
    window.toggleAns = (idx) => {
        const box = document.getElementById(`ans-${idx}`);
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    };

    window.copyCode = (idx) => {
        const code = document.getElementById(`text-${idx}`).textContent;
        navigator.clipboard.writeText(code).then(() => showMsg("Code Copied!"));
    };

    window.shareQuestion = (labId, qIdx) => {
        const shareUrl = `${window.location.origin}${window.location.pathname}?id=${labId}&q=${qIdx}`;
        navigator.clipboard.writeText(shareUrl).then(() => showMsg("Link Copied to Share!"));
    };

    window.closeQA = () => {
        document.getElementById('qa-modal').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
    };

    // --- Compiler Logic (Judge0 API) ---
    window.runCode = async (labKey, qIdx, outputTarget) => {
        const code = currentData[labKey].questions[qIdx].a;
        const outputDiv = document.getElementById(`output-${outputTarget}`);
        const runBtn = event.currentTarget;
        
        outputDiv.style.display = 'block';
        outputDiv.innerHTML = `<div class="spinner"></div> Compiling...`;
        runBtn.disabled = true;

        // Auto-detect language (simple check)
        let langId = 71; // Default Python
        if (code.includes('#include')) langId = 50; // C
        if (code.includes('public class')) langId = 62; // Java

        try {
            const response = await fetch("https://judge0-ce.p.rapidapi.com/submissions?base64_encoded=false&wait=true", {
                method: "POST",
                headers: {
                    "x-rapidapi-key": "REPLACE_WITH_FREE_RAPID_API_KEY", // Get free key from rapidapi.com
                    "x-rapidapi-host": "judge0-ce.p.rapidapi.com",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    source_code: code,
                    language_id: langId,
                })
            });

            const result = await response.json();
            outputDiv.innerText = result.stdout || result.stderr || result.compile_output || "Execution finished (No Output).";
        } catch (err) {
            outputDiv.innerText = "Error connecting to compiler.";
        } finally {
            runBtn.disabled = false;
        }
    };
</script>

</body>
</html>
